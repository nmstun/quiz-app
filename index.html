<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>咲登クイズ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>咲登クイズ</h1>
  <div class="sub">音声で答えよう。コースを選んでスタート。</div>

  <div id="courseView">
    <div class="course-list">
      <button class="course-btn" data-count="5">
        <span class="course-name">みじかい</span>
        <span class="course-count">5問</span>
      </button>
      <button class="course-btn" data-count="10">
        <span class="course-name">ふつう</span>
        <span class="course-count">10問</span>
      </button>
      <button class="course-btn" data-count="20">
        <span class="course-name">ながい</span>
        <span class="course-count">20問</span>
      </button>
    </div>
  </div>

  <div id="quizView" class="hidden">
    <div class="progress" id="progress"></div>

    <div class="question-box">
      <div class="question" id="question">--</div>
    </div>

    <div class="status-line" id="statusLine"></div>
    <div class="answer-display" id="answerDisplay">&nbsp;</div>

    <div class="controls">
      <button class="mic-btn" id="micBtn">
        <span id="micIcon">🎤</span>
        <span id="micLabel">話して答える</span>
      </button>
      <div class="text-fallback">
        <input type="text" id="textInput" inputmode="numeric" placeholder="数字で入力(音声が使えない場合)">
        <button id="submitBtn">送信</button>
      </div>
    </div>

    <div class="note" id="note"></div>
  </div>

  <div id="resultView" class="result hidden">
    <div class="sub">結果</div>
    <div class="score" id="scoreText">0/5</div>
    <div class="msg" id="scoreMsg"></div>
    <div class="time-text" id="timeText"></div>
    <div class="best-score" id="bestScoreText"></div>
    <ul class="result-list" id="resultList"></ul>
    <button class="retry-btn" id="retryBtn">もう一度挑戦</button>
    <button class="course-change-btn" id="courseChangeBtn">別のコースを選ぶ</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
